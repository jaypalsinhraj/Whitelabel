name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_MSAL_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          VITE_MSAL_AUTHORITY: "https://login.microsoftonline.com/common"
          VITE_MSAL_REDIRECT_URI: "http://localhost:3000"
          VITE_API_SCOPE: "api://00000000-0000-0000-0000-000000000000/access_as_user"
          VITE_API_BASE_URL: "http://localhost:5000"
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build backend
        run: dotnet build backend/Whitelabel.sln -c Release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli:latest
          inlineScript: |
            az group create \
              --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --location "${{ env.AZURE_LOCATION }}" \
              --output none

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli:latest
          inlineScript: |
            az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/whitelabel-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_NAME }}.azurecr.io/whitelabel-frontend:latest
          build-args: |
            VITE_MSAL_CLIENT_ID=${{ secrets.VITE_MSAL_CLIENT_ID }}
            VITE_MSAL_AUTHORITY=${{ secrets.VITE_MSAL_AUTHORITY }}
            VITE_MSAL_REDIRECT_URI=${{ secrets.VITE_MSAL_REDIRECT_URI }}
            VITE_API_SCOPE=${{ secrets.VITE_API_SCOPE }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/whitelabel-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_NAME }}.azurecr.io/whitelabel-backend:latest

      - name: Deploy infrastructure (Bicep)
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli:latest
          inlineScript: |
            az deployment group create \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "whitelabel-${{ github.run_id }}" \
              --template-file infra/main.bicep \
              --parameters @infra/params/dev.bicepparam \
              --parameters acrName=${{ secrets.ACR_NAME }} \
              --parameters frontendImageTag=${{ env.IMAGE_TAG }} \
              --parameters backendImageTag=${{ env.IMAGE_TAG }} \
              --parameters azureAdTenantId='${{ secrets.AZURE_AD_TENANT_ID }}' \
              --parameters azureAdApiClientId='${{ secrets.AZURE_AD_API_CLIENT_ID }}' \
              --parameters azureAdAudience='${{ secrets.AZURE_AD_AUDIENCE }}' \
              --parameters azureAdDomain='${{ secrets.AZURE_AD_DOMAIN }}'

      - name: Deployment outputs
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli:latest
          inlineScript: |
            az deployment group show \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "whitelabel-${{ github.run_id }}" \
              --query properties.outputs \
              --output table
