name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: uksouth
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_MSAL_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          VITE_MSAL_AUTHORITY: "https://login.microsoftonline.com/common"
          VITE_MSAL_REDIRECT_URI: "http://localhost:3000"
          VITE_API_SCOPE: "api://00000000-0000-0000-0000-000000000000/access_as_user"
          VITE_API_BASE_URL: "http://localhost:5000"
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build backend
        run: dotnet build backend/Whitelabel.sln -c Release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # Prefer Repository / Organization Variables (Settings → Secrets and variables → Actions → Variables).
      # Fallback to Secrets for backward compatibility. OIDC credentials stay as Secrets only (see azure/login).
      ACR_NAME: ${{ vars.ACR_NAME || secrets.ACR_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP }}
      VITE_MSAL_CLIENT_ID: ${{ vars.VITE_MSAL_CLIENT_ID || secrets.VITE_MSAL_CLIENT_ID }}
      VITE_MSAL_AUTHORITY: ${{ vars.VITE_MSAL_AUTHORITY || secrets.VITE_MSAL_AUTHORITY }}
      VITE_MSAL_REDIRECT_URI: ${{ vars.VITE_MSAL_REDIRECT_URI || secrets.VITE_MSAL_REDIRECT_URI }}
      VITE_API_SCOPE: ${{ vars.VITE_API_SCOPE || secrets.VITE_API_SCOPE }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
      AZURE_AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID || secrets.AZURE_AD_TENANT_ID }}
      AZURE_AD_API_CLIENT_ID: ${{ vars.AZURE_AD_API_CLIENT_ID || secrets.AZURE_AD_API_CLIENT_ID }}
      AZURE_AD_AUDIENCE: ${{ vars.AZURE_AD_AUDIENCE || secrets.AZURE_AD_AUDIENCE }}
      AZURE_AD_DOMAIN: ${{ vars.AZURE_AD_DOMAIN || secrets.AZURE_AD_DOMAIN }}
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          ok=0
          for name in ACR_NAME AZURE_RESOURCE_GROUP VITE_MSAL_CLIENT_ID VITE_MSAL_AUTHORITY VITE_MSAL_REDIRECT_URI VITE_API_SCOPE VITE_API_BASE_URL AZURE_AD_TENANT_ID AZURE_AD_API_CLIENT_ID AZURE_AD_AUDIENCE; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name — set Repository Variable or Secret (README-DEPLOYMENT.md § GitHub Actions variables)"
              ok=1
            fi
          done
          if [ -z "$POSTGRES_ADMIN_PASSWORD" ]; then
            echo "::error::Missing POSTGRES_ADMIN_PASSWORD — add a Repository secret (strong password for Azure PostgreSQL flexible server admin)"
            ok=1
          fi
          exit $ok

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}" \
            --output none

      - name: Normalize ACR name (must be lowercase a–z, 0–9 only, 5–50 chars, globally unique)
        run: |
          n=$(echo "${{ env.ACR_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "ACR_NAME=$n" >> "$GITHUB_ENV"
          echo "Using ACR_NAME=$n"

      - name: Ensure Azure Container Registry exists
        run: |
          set -e
          if az acr show --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" &>/dev/null; then
            echo "ACR '$ACR_NAME' already exists in resource group."
          else
            echo "Creating ACR '$ACR_NAME' (required before docker push; Bicep will reconcile on deploy)."
            az acr create \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$ACR_NAME" \
              --sku Basic \
              --location "$AZURE_LOCATION" \
              --admin-enabled true
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/whitelabel-frontend:${{ env.IMAGE_TAG }}
            ${{ env.ACR_NAME }}.azurecr.io/whitelabel-frontend:latest
          build-args: |
            VITE_MSAL_CLIENT_ID=${{ env.VITE_MSAL_CLIENT_ID }}
            VITE_MSAL_AUTHORITY=${{ env.VITE_MSAL_AUTHORITY }}
            VITE_MSAL_REDIRECT_URI=${{ env.VITE_MSAL_REDIRECT_URI }}
            VITE_API_SCOPE=${{ env.VITE_API_SCOPE }}
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/whitelabel-backend:${{ env.IMAGE_TAG }}
            ${{ env.ACR_NAME }}.azurecr.io/whitelabel-backend:latest

      - name: Deploy infrastructure (Bicep)
        run: |
          # Do not mix --parameters @*.bicepparam with extra --parameters; Azure CLI mis-parses it.
          # Values mirror infra/params/dev.bicepparam; image tags and Entra IDs come from the workflow env.
          az deployment group create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "whitelabel-${{ github.run_id }}" \
            --template-file infra/main.bicep \
            --parameters environment=dev \
            --parameters containerAppsEnvName=cae-whitelabel-dev \
            --parameters logRetentionDays=30 \
            --parameters minReplicas=1 \
            --parameters maxReplicas=3 \
            --parameters acrName="${{ env.ACR_NAME }}" \
            --parameters frontendImageTag="${{ env.IMAGE_TAG }}" \
            --parameters backendImageTag="${{ env.IMAGE_TAG }}" \
            --parameters azureAdTenantId='${{ env.AZURE_AD_TENANT_ID }}' \
            --parameters azureAdApiClientId='${{ env.AZURE_AD_API_CLIENT_ID }}' \
            --parameters azureAdAudience='${{ env.AZURE_AD_AUDIENCE }}' \
            --parameters azureAdDomain='${{ env.AZURE_AD_DOMAIN }}' \
            --parameters postgresAdminLogin=whitelabel \
            --parameters postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD"

      - name: Deployment outputs
        run: |
          az deployment group show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "whitelabel-${{ github.run_id }}" \
            --query properties.outputs \
            --output table
